<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sheffield Cycle Map</title>
    <meta name="theme-color" content="#0f6bd8" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/pwa-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="./icons/pwa-192.png" />
    <link rel="stylesheet" href="./bundle.css" />
  </head>
  <body>
    <div id="map"></div>
    <script type="module" src="./bundle.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js");
          // The page is served from the old precache before the update check
          // finishes, so without this a deploy is always one refresh behind.
          // Reload once the new worker takes over; skip the very first
          // install, where the page came straight from the network anyway.
          // Map state lives in the URL hash, so nothing is lost.
          if (navigator.serviceWorker.controller) {
            navigator.serviceWorker.addEventListener("controllerchange", () =>
              window.location.reload(),
            );
          }
        });
      }
    </script>
  </body>
</html>
